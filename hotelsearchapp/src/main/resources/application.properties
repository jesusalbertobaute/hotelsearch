spring.application.name=hotelsearch

spring.datasource.url=jdbc:oracle:thin:@${SPRING_ORACLESQL_HOST:localhost}:${SPRING_ORACLESQL_PORT:1521}/FREEPDB1
spring.datasource.username=hotelapp
spring.datasource.password=${oracle_user_password:}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=create-drop

resilience4j.retry.instances.outboxRetry.max-attempts=3
resilience4j.retry.instances.outboxRetry.wait-duration=2s
resilience4j.retry.instances.outboxRetry.retry-exceptions=java.sql.SQLException,com.mindata.hotelsearch.infrastructure.adapter.exception.PersistenceOutboxException,java.lang.Exception

resilience4j.circuitbreaker.instances.outboxCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.outboxCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.outboxCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.outboxCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.outboxCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.outboxCB.minimum-number-of-calls=5

resilience4j.retry.instances.kafkaPublisherRetry.max-attempts=3
resilience4j.retry.instances.kafkaPublisherRetry.wait-duration=2s
resilience4j.retry.instances.kafkaPublisherRetry.retry-exceptions=org.apache.kafka.common.KafkaException,java.lang.Exception

resilience4j.circuitbreaker.instances.kafkaPublisherCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafkaPublisherCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafkaPublisherCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaPublisherCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafkaPublisherCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.kafkaPublisherCB.minimum-number-of-calls=5

spring.kafka.bootstrap-servers=${SPRING_KAFKA_HOST:localhost}:${SPRING_KAFKA_PORT:29092}
spring.kafka.producer.retries=10
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.acks=all
spring.kafka.producer.properties.max.in.flight.requests.per.connection= 5

kafka.topic.searches=hotel_availability_searches
